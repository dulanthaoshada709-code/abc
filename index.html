<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dulantha AI | Premium Interface</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #4e9af1;
            --bg-dark: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Container Animation */
        .chat-container {
            width: 95%;
            max-width: 700px;
            height: 85vh;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Header Section */
        .header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            margin: 0;
            font-size: 1.5rem;
            background: linear-gradient(to right, #4e9af1, #a5d6ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .help-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
            color: #ccc;
            padding: 8px 15px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 14px;
        }

        .help-btn:hover {
            background: #e11d48;
            color: white;
        }

        /* Chat Window */
        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            scroll-behavior: smooth;
        }

        .msg {
            max-width: 80%;
            margin-bottom: 20px;
            padding: 12px 18px;
            border-radius: 15px;
            line-height: 1.5;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .user-msg {
            background: var(--primary-color);
            align-self: flex-end;
            margin-left: auto;
            border-bottom-right-radius: 2px;
        }

        .ai-msg {
            background: rgba(255, 255, 255, 0.1);
            border-bottom-left-radius: 2px;
        }

        /* Input Area */
        .input-area {
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            display: flex;
            gap: 12px;
            border-bottom-left-radius: 24px;
            border-bottom-right-radius: 24px;
        }

        input {
            flex: 1;
            padding: 14px;
            border-radius: 14px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--primary-color); }

        .send-btn {
            background: var(--primary-color);
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 14px;
            color: white;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .send-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 15px var(--primary-color);
        }

        /* Custom Scrollbar */
        #chat-window::-webkit-scrollbar { width: 5px; }
        #chat-window::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="header">
            <button class="help-btn" onclick="getHelp()"><i class="fas fa-question-circle"></i> Get Help</button>
            <h1>Dulantha AI <i class="fas fa-robot"></i></h1>
            <div style="width: 80px;"></div> </div>

        <div id="chat-window">
            <div class="msg ai-msg">
                ආයුබෝවන්! මම <b>Dulantha AI</b>. ඔබට අද මගෙන් ලැබිය යුතු සහය කුමක්ද?
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="ඔබේ පණිවිඩය මෙතන ලියන්න..." onkeypress="handleKey(event)">
            <button class="send-btn" onclick="askAI()">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <script>
        const API_KEY = "AIzaSyBb65cY9o9zecAZvm0Ko5VxaG-oZwcq8XE"; 

        async function askAI() {
            const inputField = document.getElementById('userInput');
            const input = inputField.value.trim();
            if (!input) return;

            const chatWindow = document.getElementById('chat-window');
            
            // User Message
            chatWindow.innerHTML += `<div class="msg user-msg"><b>ඔබ:</b><br>${input}</div>`;
            inputField.value = '';
            scrollToBottom();

            // Loading state
            const loadingId = Date.now();
            chatWindow.innerHTML += `<div class="msg ai-msg" id="${loadingId}">...සිතමින් පවතී...</div>`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: input }] }] })
                });

                const data = await response.json();
                const aiText = data.candidates[0].content.parts[0].text;
                
                document.getElementById(loadingId).innerHTML = `<b>Dulantha AI:</b><br>${aiText}`;
            } catch (error) {
                document.getElementById(loadingId).style.color = "#ff4d4d";
                document.getElementById(loadingId).innerText = "සමාවන්න, සම්බන්ධතාවයේ දෝෂයක් පවතී.";
            }
            scrollToBottom();
        }

        function handleKey(e) {
            if (e.key === 'Enter') askAI();
        }

        function scrollToBottom() {
            const chatWindow = document.getElementById('chat-window');
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function getHelp() {
            alert("උදව් අවශ්‍යද?\n\n1. අයිතිකරුවෙකුනේ සහය ලබා ගන්න 94774860151\n2. අන්තර්ජාල සම්බන්ධතාවය පරීක්ෂා කරන්න.\n3. ඕනෑම ප්‍රශ්නයක් සිංහලෙන් හෝ ඉංග්‍රීසියෙන් විමසන්න.");
        }
    </script>
</body>
</html>
